# CI/CD Workflow - Optimized for speed and reliability

name: CI

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main, develop]

# Cancel outdated runs for same ref

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Set environment for all jobs

env:
  NODE_ENV: production

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Reduced from 0 for faster checkout

      # Bun setup using version file for deterministic builds
      # Version controlled via .bun-version file
      # Workaround for: https://github.com/outfitter-dev/rulesets/issues/67
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      # Cache Bun dependencies
      - name: Cache Bun Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock*', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Cache build artifacts
      - name: Cache Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            **/dist
            **/.cache
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Install Dependencies
        run: |
          # Clear cache if needed (helps with registry issues)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run detected - clearing Bun cache"
            bun pm cache rm || true
          fi

          # Install with frozen lockfile for reproducibility
          if [ -f "bun.lock" ]; then
            bun install --frozen-lockfile
          else
            echo "Warning: bun.lock not found, installing without lock"
            bun install
          fi

      # Run all checks using new Bun scripts with enhanced error reporting
      - name: Lint
        id: lint
        run: |
          set -o pipefail
          echo "🔍 Running linting..."
          bun run lint 2>&1 | tee lint.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "lint_failed=true" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Type Check
        id: typecheck
        run: |
          set -o pipefail
          echo "🔍 Running type checking..."
          bun run typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "typecheck_failed=true" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Test
        id: test
        run: |
          set -o pipefail
          echo "🧪 Running tests..."
          bun run test 2>&1 | tee test.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "test_failed=true" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Build
        id: build
        run: |
          set -o pipefail
          echo "🏗️ Running build..."
          bun run build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "build_failed=true" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # Upload logs for debugging
      - name: Upload CI Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            lint.log
            typecheck.log
            test.log
            build.log
          retention-days: 7

      # Check results and provide comprehensive summary
      - name: Check Results
        if: always()
        run: |
          echo "## 📊 CI Results Summary" >> $GITHUB_STEP_SUMMARY

          # Check each step and provide detailed feedback
          FAILED=false

          if [[ "${{ steps.lint.outcome }}" == "failure" || "${{ steps.lint.outputs.lint_failed }}" == "true" ]]; then
            echo "❌ Linting failed"
            echo "- ❌ **Linting**: Failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ Linting passed"
            echo "- ✅ **Linting**: Passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ steps.typecheck.outcome }}" == "failure" || "${{ steps.typecheck.outputs.typecheck_failed }}" == "true" ]]; then
            echo "❌ Type checking failed"
            echo "- ❌ **Type Check**: Failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ Type checking passed"
            echo "- ✅ **Type Check**: Passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ steps.test.outcome }}" == "failure" || "${{ steps.test.outputs.test_failed }}" == "true" ]]; then
            echo "❌ Tests failed"
            echo "- ❌ **Tests**: Failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ Tests passed"
            echo "- ✅ **Tests**: Passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ steps.build.outcome }}" == "failure" || "${{ steps.build.outputs.build_failed }}" == "true" ]]; then
            echo "❌ Build failed"
            echo "- ❌ **Build**: Failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "✅ Build passed"
            echo "- ✅ **Build**: Passed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$FAILED" == "true" ]]; then
            echo "💡 **Next Steps**: Check the uploaded CI logs artifact for detailed error information." >> $GITHUB_STEP_SUMMARY
            echo "❌ Some checks failed"
            exit 1
          else
            echo "🎉 **Status**: All checks passed successfully!" >> $GITHUB_STEP_SUMMARY
            echo "✅ All checks passed"
          fi

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for changesets

      # Bun setup using version file for deterministic builds
      # Version controlled via .bun-version file
      # Workaround for: https://github.com/outfitter-dev/rulesets/issues/67
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      # Reuse caches from build job
      - name: Cache Bun Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Dependencies
        run: |
          # Clear cache if needed (helps with registry issues)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run detected - clearing Bun cache"
            bun pm cache rm || true
          fi

          # Install with frozen lockfile for reproducibility
          if [ -f "bun.lock" ]; then
            bun install --frozen-lockfile
          else
            echo "Warning: bun.lock not found, installing without lock"
            bun install
          fi

      # Build only (tests already passed)
      - name: Build for Release
        run: bun run build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
