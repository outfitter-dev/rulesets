# Temporary CI workflow using npm due to Bun registry issues
# This workflow uses npm for package installation but Bun for script execution

name: CI (NPM Fallback)

on:
  push:
    branches: [main, develop, release/*, feature/handlebars-adoption]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production

jobs:
  build_and_test:
    name: Build and Test (NPM)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Setup Node.js for npm package management
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Setup Bun for script execution (it's faster than npm run)
      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      # Cache node_modules
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # Cache build artifacts
      - name: Cache Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            **/dist
            **/.cache
            .turbo
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Generate package-lock.json if missing
        run: |
          if [ ! -f "package-lock.json" ]; then
            echo "📦 Generating package-lock.json from bun.lock..."
            # First, try to use bun's lock file if it exists
            if [ -f "bun.lock" ]; then
              # Export to package-lock format (this might not work with current Bun versions)
              echo "Note: Direct conversion not available, generating fresh lock"
            fi
            # Generate fresh package-lock.json
            npm install --package-lock-only
          fi

      - name: Install Dependencies
        run: |
          echo "📦 Installing dependencies with npm..."
          npm ci || npm install

      # Verify installation
      - name: Verify Installation
        run: |
          echo "✅ Verifying installation..."
          ls -la node_modules/@types/ | head -20
          echo "Total packages installed: $(find node_modules -maxdepth 1 -type d | wc -l)"

      # Run all checks using Bun for speed
      - name: Lint
        id: lint
        run: |
          echo "🔍 Running linting..."
          bun run lint 2>&1 | tee lint.log || echo "lint_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Type Check
        id: typecheck
        run: |
          echo "🔍 Running type checking..."
          bun run typecheck 2>&1 | tee typecheck.log || echo "typecheck_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Test
        id: test
        run: |
          echo "🧪 Running tests..."
          bun run test 2>&1 | tee test.log || echo "test_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Build
        id: build
        run: |
          echo "🏗️ Running build..."
          bun run build 2>&1 | tee build.log || echo "build_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      # Upload logs for debugging
      - name: Upload CI Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-npm
          path: |
            lint.log
            typecheck.log
            test.log
            build.log
          retention-days: 7

      # Check results
      - name: Check Results
        if: always()
        run: |
          echo "## 📊 CI Results Summary (NPM Fallback)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ **Note**: Using npm for package management due to Bun registry issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=false

          if [[ "${{ steps.lint.outcome }}" == "failure" || "${{ steps.lint.outputs.lint_failed }}" == "true" ]]; then
            echo "- ❌ **Linting**: Failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "- ✅ **Linting**: Passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ steps.typecheck.outcome }}" == "failure" || "${{ steps.typecheck.outputs.typecheck_failed }}" == "true" ]]; then
            echo "- ❌ **Type Check**: Failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "- ✅ **Type Check**: Passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ steps.test.outcome }}" == "failure" || "${{ steps.test.outputs.test_failed }}" == "true" ]]; then
            echo "- ❌ **Tests**: Failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "- ✅ **Tests**: Passed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ steps.build.outcome }}" == "failure" || "${{ steps.build.outputs.build_failed }}" == "true" ]]; then
            echo "- ❌ **Build**: Failed" >> $GITHUB_STEP_SUMMARY
            FAILED=true
          else
            echo "- ✅ **Build**: Passed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$FAILED" == "true" ]]; then
            echo "💡 **Next Steps**: Check the uploaded CI logs artifact for detailed error information." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "🎉 **Status**: All checks passed successfully!" >> $GITHUB_STEP_SUMMARY
          fi

  release:
    name: Release (NPM)
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Build for Release
        run: bun run build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}