# Bun configuration file
# This configuration works around the Bun InvalidURL bug with scoped packages in CI
# See: https://github.com/outfitter-dev/rulesets/issues/67

[install]
# Explicit registry with trailing slash to fix URL joining
registry = "https://registry.npmjs.org/"

# Use frozen lockfile by default (same as --frozen-lockfile flag)
frozenLockfile = false

# Optional: Specify exact for deterministic installs
exact = false

[install.scopes]
# Map each scope to the registry explicitly to bypass URL joining bug
"@types" = "https://registry.npmjs.org/"
"@biomejs" = "https://registry.npmjs.org/"
"@changesets" = "https://registry.npmjs.org/"
"@commitlint" = "https://registry.npmjs.org/"

# Cache configuration
[install.cache]
# Use shared cache for faster installs
dir = "~/.bun/install/cache"
disable = false

# Lockfile configuration
[install.lockfile]
# Save lockfile for reproducible installs
save = true
# Use yarn format (only supported output format currently)
print = "yarn"