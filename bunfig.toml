# Bun configuration for @outfitter/rulesets monorepo
# https://bun.sh/docs/runtime/configuration

[install]
# Match workspace behavior for monorepo packages
linkWorkspacePackages = true

# Use isolated linker for better monorepo workspace management
linker = "isolated"

# Use exact versions for lockfile stability
exact = false
frozenLockfile = true

# Cache configuration
cache = true
registry = "https://registry.npmjs.org"

[install.scopes]
# Optimize for our common scopes
"@rulesets" = { registry = "https://registry.npmjs.org" }
"@biomejs" = { registry = "https://registry.npmjs.org" }
"@changesets" = { registry = "https://registry.npmjs.org" }

[test]
# Default test configuration
preload = ["./test/setup.ts"]
coverage = true
timeout = 10000

[run]
# Set NODE_ENV if not already set
env = { NODE_ENV = "development" }