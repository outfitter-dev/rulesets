# lefthook.yml - Git hooks configuration
# https://lefthook.dev/configuration/

pre-commit:
  parallel: false
  commands:
    lockfile-check:
      glob: "package.json"
      run: |
        echo "📦 Checking if lockfile is up to date..."
        bun install --dry-run 2>&1 | grep -q "lockfile had changes" && {
          echo "❌ Lockfile is out of sync with package.json!"
          echo "   Run 'bun run update-lockfile' to fix this."
          exit 1
        } || echo "✅ Lockfile is in sync"

    prettier:
      glob: "*.{yaml,yml,md,mdx,mdc}"
      run: prettier --write {staged_files} --ignore-path .gitignore

    markdownlint:
      glob: "*.{md,mdx,mdc}"
      run: bun run lint:md:fix

    lint:
      glob: "*.{js,ts,tsx}"
      run: bun run lint

    typecheck:
      glob: "*.{ts,tsx}"
      run: bun run typecheck

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
